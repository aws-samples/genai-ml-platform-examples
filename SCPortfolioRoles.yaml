AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Creates IAM roles required by Amazon SageMaker project templates
  (Service Catalog products). Deploy this stack before enabling
  SageMaker project templates in Studio.

Resources:

  # ============================================================
  # 1. Launch Role - Used by Service Catalog to launch products
  # ============================================================
  LaunchRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AmazonSageMakerServiceCatalogProductsLaunchRole
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: servicecatalog.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerAdmin-ServiceCatalogProductsServiceRolePolicy
      Policies:
        - PolicyName: SageMakerSCLaunchPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/AmazonSageMakerServiceCatalogProducts*'
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplateSummary
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: 'arn:aws:s3:::sagemaker-*'
              - Sid: LaunchRoleSeedCodeAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                Resource:
                  - 'arn:aws:s3:::sagemaker-servicecatalog-seedcode-*'
                  - 'arn:aws:s3:::sagemaker-servicecatalog-seedcode-*/*'
              - Effect: Allow
                Action:
                  - servicecatalog:*
                Resource: '*'

  # ============================================================
  # 2. Use Role - Assumed by end users to interact with products
  # ============================================================
  UseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AmazonSageMakerServiceCatalogProductsUseRole
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - sagemaker.amazonaws.com
                - codepipeline.amazonaws.com
                - codebuild.amazonaws.com
                - cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
      Policies:
        - PolicyName: SageMakerSCUsePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - !Sub 'arn:aws:s3:::sagemaker-*'
                  - !Sub 'arn:aws:s3:::sagemaker-*/*'
              - Effect: Allow
                Action:
                  - codecommit:*
                Resource: !Sub 'arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:sagemaker-*'
              - Effect: Allow
                Action:
                  - codebuild:*
                Resource: !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/sagemaker-*'
              - Effect: Allow
                Action:
                  - codepipeline:*
                Resource: !Sub 'arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:sagemaker-*'
              - Effect: Allow
                Action:
                  - ecr:*
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/sagemaker-*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/AmazonSageMakerServiceCatalogProducts*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudformation:*
                Resource: '*'

  # ============================================================
  # 3. API Gateway Role - For projects that deploy endpoints via APIGW
  # ============================================================
  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AmazonSageMakerServiceCatalogProductsApiGatewayRole
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SageMakerSCApiGatewayPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sagemaker:InvokeEndpoint
                Resource: !Sub 'arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:sagemaker-*'

  # ============================================================
  # 4. CloudFormation Role - For provisioning project resources
  # ============================================================
  CloudFormationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AmazonSageMakerServiceCatalogProductsCloudformationRole
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
      Policies:
        - PolicyName: SageMakerSCCloudFormationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - 'arn:aws:s3:::sagemaker-*'
                  - 'arn:aws:s3:::sagemaker-*/*'
                  - !Sub 'arn:aws:s3:::${AWS::AccountId}-*'
                  - !Sub 'arn:aws:s3:::${AWS::AccountId}-*/*'
                  - !Sub 'arn:aws:s3:::*-${AWS::AccountId}-*'
                  - !Sub 'arn:aws:s3:::*-${AWS::AccountId}-*/*'
              - Sid: CFNSeedCodeAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                Resource:
                  - 'arn:aws:s3:::sagemaker-servicecatalog-seedcode-*'
                  - 'arn:aws:s3:::sagemaker-servicecatalog-seedcode-*/*'
              - Effect: Allow
                Action:
                  - lambda:*
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:sagemaker-*'
              - Effect: Allow
                Action:
                  - codebuild:*
                Resource: !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/sagemaker-*'
              - Effect: Allow
                Action:
                  - codecommit:*
                Resource: !Sub 'arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:sagemaker-*'
              - Effect: Allow
                Action:
                  - codepipeline:*
                Resource: !Sub 'arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:sagemaker-*'
              - Effect: Allow
                Action:
                  - events:*
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/AmazonSageMakerServiceCatalogProducts*'
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/sagemaker-*'
              - Effect: Allow
                Action:
                  - ecr:*
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/sagemaker-*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:DeleteLogGroup
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                Resource: '*'
              - Effect: Allow
                Action:
                  - apigateway:*
                Resource: '*'

  # ============================================================
  # 5. CodeBuild Role - For CI/CD build stages
  # ============================================================
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AmazonSageMakerServiceCatalogProductsCodeBuildRole
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SageMakerSCCodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sagemaker:*
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - 'arn:aws:s3:::sagemaker-*'
                  - 'arn:aws:s3:::sagemaker-*/*'
                  - !Sub 'arn:aws:s3:::${AWS::AccountId}-*'
                  - !Sub 'arn:aws:s3:::${AWS::AccountId}-*/*'
                  - !Sub 'arn:aws:s3:::*-${AWS::AccountId}-*'
                  - !Sub 'arn:aws:s3:::*-${AWS::AccountId}-*/*'
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                  - ecr:GetAuthorizationToken
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:CreateRepository
                  - ecr:DescribeRepositories
                  - ecr:DescribeImages
                Resource: '*'
              - Effect: Allow
                Action:
                  - codecommit:GitPull
                  - codecommit:GitPush
                  - codecommit:CreateBranch
                  - codecommit:GetBranch
                  - codecommit:GetRepository
                  - codecommit:CreateCommit
                  - codecommit:PutFile
                  - codecommit:GetCommit
                  - codecommit:ListBranches
                Resource: !Sub 'arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:sagemaker-*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/AmazonSageMakerServiceCatalogProducts*'
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: '*'
                Condition:
                  StringLike:
                    kms:ViaService:
                      - s3.*.amazonaws.com
                      - sagemaker.*.amazonaws.com
              - Sid: JumpStartCacheAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - 'arn:aws:s3:::jumpstart-cache-prod-*'
                  - 'arn:aws:s3:::jumpstart-cache-prod-*/*'
              - Sid: ServiceCatalogSeedCodeAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                Resource:
                  - 'arn:aws:s3:::sagemaker-servicecatalog-seedcode-*'
                  - 'arn:aws:s3:::sagemaker-servicecatalog-seedcode-*/*'
              - Sid: CodeConnectionsAccess
                Effect: Allow
                Action:
                  - codeconnections:UseConnection
                  - codeconnections:GetConnection
                  - codeconnections:PassConnection
                  - codestar-connections:UseConnection
                  - codestar-connections:GetConnection
                  - codestar-connections:PassConnection
                Resource: !Sub 'arn:aws:codeconnections:${AWS::Region}:${AWS::AccountId}:connection/*'
              - Sid: CodeStarConnectionsAccess
                Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                  - codestar-connections:GetConnection
                  - codestar-connections:PassConnection
                Resource: !Sub 'arn:aws:codestar-connections:${AWS::Region}:${AWS::AccountId}:connection/*'

  # ============================================================
  # 6. CodePipeline Role - For CI/CD pipeline orchestration
  # ============================================================
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AmazonSageMakerServiceCatalogProductsCodePipelineRole
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SageMakerSCCodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - 'arn:aws:s3:::sagemaker-*'
                  - 'arn:aws:s3:::sagemaker-*/*'
              - Effect: Allow
                Action:
                  - codecommit:CancelUploadArchive
                  - codecommit:GetBranch
                  - codecommit:GetCommit
                  - codecommit:GetUploadArchiveStatus
                  - codecommit:UploadArchive
                  - codecommit:GetRepository
                Resource: !Sub 'arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:sagemaker-*'
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/sagemaker-*'
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:SetStackPolicy
                  - cloudformation:ValidateTemplate
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/AmazonSageMakerServiceCatalogProducts*'

  # ============================================================
  # 7. Events Role - For EventBridge rules triggering pipelines
  # ============================================================
  EventsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AmazonSageMakerServiceCatalogProductsEventsRole
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SageMakerSCEventsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - codepipeline:StartPipelineExecution
                Resource: !Sub 'arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:sagemaker-*'
              - Effect: Allow
                Action:
                  - sagemaker:SendPipelineExecutionStepFailure
                  - sagemaker:SendPipelineExecutionStepSuccess
                Resource: '*'

  # ============================================================
  # 8. Firehose Role - For data delivery streams
  # ============================================================
  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AmazonSageMakerServiceCatalogProductsFirehoseRole
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SageMakerSCFirehosePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - 'arn:aws:s3:::sagemaker-*'
                  - 'arn:aws:s3:::sagemaker-*/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:ListShards
                Resource: '*'

  # ============================================================
  # 9. Glue Role - For data processing with AWS Glue
  # ============================================================
  GlueRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AmazonSageMakerServiceCatalogProductsGlueRole
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: SageMakerSCGluePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - 'arn:aws:s3:::sagemaker-*'
                  - 'arn:aws:s3:::sagemaker-*/*'
                  - !Sub 'arn:aws:s3:::${AWS::AccountId}-*'
                  - !Sub 'arn:aws:s3:::${AWS::AccountId}-*/*'
                  - !Sub 'arn:aws:s3:::*-${AWS::AccountId}-*'
                  - !Sub 'arn:aws:s3:::*-${AWS::AccountId}-*/*'
              - Effect: Allow
                Action:
                  - sagemaker:*FeatureGroup*
                  - sagemaker:*FeatureStore*
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  # ============================================================
  # 10. Lambda Role - For Lambda functions in project templates
  # ============================================================
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AmazonSageMakerServiceCatalogProductsLambdaRole
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SageMakerSCLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sagemaker:*
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - 'arn:aws:s3:::sagemaker-*'
                  - 'arn:aws:s3:::sagemaker-*/*'
              - Sid: LambdaSeedCodeAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                Resource:
                  - 'arn:aws:s3:::sagemaker-servicecatalog-seedcode-*'
                  - 'arn:aws:s3:::sagemaker-servicecatalog-seedcode-*/*'
              - Effect: Allow
                Action:
                  - ecr:*
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/sagemaker-*'
              - Effect: Allow
                Action:
                  - codecommit:*
                Resource: !Sub 'arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:sagemaker-*'
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                  - codebuild:CreateProject
                  - codebuild:DeleteProject
                Resource: !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/sagemaker-*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/AmazonSageMakerServiceCatalogProducts*'
              - Effect: Allow
                Action:
                  - events:PutRule
                  - events:PutTargets
                  - events:DeleteRule
                  - events:RemoveTargets
                  - events:DescribeRule
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                Resource: '*'

  # ============================================================
  # 11. Execution Role - For SageMaker pipeline/job execution
  # ============================================================
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AmazonSageMakerServiceCatalogProductsExecutionRole
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - sagemaker.amazonaws.com
                - states.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
      Policies:
        - PolicyName: SageMakerSCExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - 'arn:aws:s3:::sagemaker-*'
                  - 'arn:aws:s3:::sagemaker-*/*'
                  - !Sub 'arn:aws:s3:::${AWS::AccountId}-*'
                  - !Sub 'arn:aws:s3:::${AWS::AccountId}-*/*'
                  - !Sub 'arn:aws:s3:::*-${AWS::AccountId}-*'
                  - !Sub 'arn:aws:s3:::*-${AWS::AccountId}-*/*'
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetTable
                  - glue:GetPartitions
                  - glue:GetDatabases
                  - glue:GetTables
                  - glue:CreateTable
                  - glue:UpdateTable
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/AmazonSageMakerServiceCatalogProducts*'
                Condition:
                  StringEquals:
                    iam:PassedToService:
                      - sagemaker.amazonaws.com
                      - glue.amazonaws.com
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:sagemaker-*'

Outputs:
  LaunchRoleArn:
    Description: ARN of the Service Catalog Launch Role
    Value: !GetAtt LaunchRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LaunchRoleArn'

  UseRoleArn:
    Description: ARN of the Service Catalog Use Role
    Value: !GetAtt UseRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-UseRoleArn'

  ExecutionRoleArn:
    Description: ARN of the SageMaker Execution Role
    Value: !GetAtt ExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ExecutionRoleArn'

  CodeBuildRoleArn:
    Description: ARN of the CodeBuild Role
    Value: !GetAtt CodeBuildRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CodeBuildRoleArn'

  CodePipelineRoleArn:
    Description: ARN of the CodePipeline Role
    Value: !GetAtt CodePipelineRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CodePipelineRoleArn'

  CloudFormationRoleArn:
    Description: ARN of the CloudFormation Role
    Value: !GetAtt CloudFormationRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CloudFormationRoleArn'

  LambdaRoleArn:
    Description: ARN of the Lambda Role
    Value: !GetAtt LambdaRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaRoleArn'

  GlueRoleArn:
    Description: ARN of the Glue Role
    Value: !GetAtt GlueRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-GlueRoleArn'
