AWSTemplateFormatVersion: '2010-09-09'
Description: SageMaker Unified Studio Infrastructure Orchestrator - Deploys VPC, IAM roles, S3 bucket, and Domain

Parameters:
  S3AssetsBucket:
    Type: String
    Description: S3 bucket containing CloudFormation templates
    Default: cfn-for-smus-domain-creation
    
  S3AssetsPrefix:
    Type: String
    Description: S3 prefix for CloudFormation templates
    Default: cloudformation/
    
  DomainName:
    Type: String
    Description: Name of the DataZone domain
    Default: smus-domain-orchestrated

  DeployIdentityCenter:
    Type: String
    Description: Whether to deploy a new IAM Identity Center instance
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

  VpcCidr:
    Type: String
    Description: CIDR block for the VPC (must be /16). Only used when creating a new VPC.
    Default: "10.38.0.0/16"

  ExistingVpcId:
    Type: String
    Description: (Optional) ID of an existing VPC to use. Leave empty to create a new VPC.
    Default: ""

  ExistingPrivateSubnet1Id:
    Type: String
    Description: (Optional) ID of existing private subnet 1. Required if ExistingVpcId is provided.
    Default: ""

  ExistingPrivateSubnet2Id:
    Type: String
    Description: (Optional) ID of existing private subnet 2. Required if ExistingVpcId is provided.
    Default: ""

  ExistingPrivateSubnet3Id:
    Type: String
    Description: (Optional) ID of existing private subnet 3. Required if ExistingVpcId is provided.
    Default: ""

Conditions:
  ShouldDeployIdentityCenter: !Equals [!Ref DeployIdentityCenter, "true"]
  CreateNewVpc: !Equals [!Ref ExistingVpcId, ""]

Resources:
  # S3 bucket for domain resources
  DomainS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-domain-resources-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Component
          Value: DomainStorage
        - Key: ManagedBy
          Value: SMUS-Orchestrator

  VPCStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateNewVpc
    Properties:
      TemplateURL: !Sub "https://${S3AssetsBucket}.s3.amazonaws.com/${S3AssetsPrefix}SageMakerUnifiedStudio-VPC.yaml"
      TimeoutInMinutes: 30
      Tags:
        - Key: Component
          Value: VPC
        - Key: ManagedBy
          Value: SMUS-Orchestrator

  IAMRolesStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${S3AssetsBucket}.s3.amazonaws.com/${S3AssetsPrefix}create-smus-iam-roles.yaml"
      TimeoutInMinutes: 15
      Tags:
        - Key: Component
          Value: IAMRoles
        - Key: ManagedBy
          Value: SMUS-Orchestrator

  IdentityCenterStack:
    Type: AWS::CloudFormation::Stack
    Condition: ShouldDeployIdentityCenter
    Properties:
      TemplateURL: !Sub "https://${S3AssetsBucket}.s3.amazonaws.com/${S3AssetsPrefix}identity-center.yaml"
      TimeoutInMinutes: 15
      Tags:
        - Key: Component
          Value: IdentityCenter
        - Key: ManagedBy
          Value: SMUS-Orchestrator

  DomainStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: 
      - VPCStack
      - IAMRolesStack
      - DomainS3Bucket
    Properties:
      TemplateURL: !Sub "https://${S3AssetsBucket}.s3.amazonaws.com/${S3AssetsPrefix}create_smus_domain.yaml"
      Parameters:
        DomainName: !Ref DomainName
        DomainExecutionRoleArn: !GetAtt IAMRolesStack.Outputs.DomainExecutionRoleArn
        DomainServiceRoleArn: !GetAtt IAMRolesStack.Outputs.DomainServiceRoleArn
        ManageAccessRoleArn: !GetAtt IAMRolesStack.Outputs.ManageAccessRoleArn
        ProvisioningRoleArn: !GetAtt IAMRolesStack.Outputs.ProvisioningRoleArn
        VPCId: !If [CreateNewVpc, !GetAtt VPCStack.Outputs.VpcId, !Ref ExistingVpcId]
        PrivateSubnet1Id: !If [CreateNewVpc, !GetAtt VPCStack.Outputs.PrivateSubnet1Id, !Ref ExistingPrivateSubnet1Id]
        PrivateSubnet2Id: !If [CreateNewVpc, !GetAtt VPCStack.Outputs.PrivateSubnet2Id, !Ref ExistingPrivateSubnet2Id]
        PrivateSubnet3Id: !If [CreateNewVpc, !GetAtt VPCStack.Outputs.PrivateSubnet3Id, !Ref ExistingPrivateSubnet3Id]
        S3BucketName: !Ref DomainS3Bucket
        S3AssetsBucket: !Ref S3AssetsBucket
        S3AssetsPrefix: !Ref S3AssetsPrefix
      TimeoutInMinutes: 60
      Tags:
        - Key: Component
          Value: Domain
        - Key: ManagedBy
          Value: SMUS-Orchestrator

Outputs:
  # S3 Bucket Output
  DomainS3BucketName:
    Description: Name of the S3 bucket for domain resources
    Value: !Ref DomainS3Bucket
    Export:
      Name: !Sub "${AWS::StackName}-DomainS3BucketName"

  # Stack IDs
  VPCStackId:
    Description: Stack ID of the VPC stack
    Condition: CreateNewVpc
    Value: !Ref VPCStack
    Export:
      Name: !Sub "${AWS::StackName}-VPCStackId"
      
  IAMRolesStackId:
    Description: Stack ID of the IAM roles stack
    Value: !Ref IAMRolesStack
    Export:
      Name: !Sub "${AWS::StackName}-IAMRolesStackId"

  IdentityCenterStackId:
    Description: Stack ID of the Identity Center stack
    Condition: ShouldDeployIdentityCenter
    Value: !Ref IdentityCenterStack
    Export:
      Name: !Sub "${AWS::StackName}-IdentityCenterStackId"
      
  DomainStackId:
    Description: Stack ID of the Domain stack
    Value: !Ref DomainStack
    Export:
      Name: !Sub "${AWS::StackName}-DomainStackId"
      
  # VPC outputs (from new stack or existing)
  VPCId:
    Description: VPC ID used by the domain
    Value: !If [CreateNewVpc, !GetAtt VPCStack.Outputs.VpcId, !Ref ExistingVpcId]
    Export:
      Name: !Sub "${AWS::StackName}-VPCId"
      
  PublicSubnetId:
    Description: Public subnet ID from VPC stack
    Condition: CreateNewVpc
    Value: !GetAtt VPCStack.Outputs.PublicSubnetId
    Export:
      Name: !Sub "${AWS::StackName}-PublicSubnetId"
      
  PrivateSubnet1Id:
    Description: Private subnet 1 ID
    Value: !If [CreateNewVpc, !GetAtt VPCStack.Outputs.PrivateSubnet1Id, !Ref ExistingPrivateSubnet1Id]
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnet1Id"
      
  PrivateSubnet2Id:
    Description: Private subnet 2 ID
    Value: !If [CreateNewVpc, !GetAtt VPCStack.Outputs.PrivateSubnet2Id, !Ref ExistingPrivateSubnet2Id]
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnet2Id"
      
  PrivateSubnet3Id:
    Description: Private subnet 3 ID
    Value: !If [CreateNewVpc, !GetAtt VPCStack.Outputs.PrivateSubnet3Id, !Ref ExistingPrivateSubnet3Id]
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnet3Id"
      
  # Pass through IAM role outputs
  DomainExecutionRoleArn:
    Description: Domain Execution Role ARN from IAM stack
    Value: !GetAtt IAMRolesStack.Outputs.DomainExecutionRoleArn
    Export:
      Name: !Sub "${AWS::StackName}-DomainExecutionRoleArn"
      
  DomainServiceRoleArn:
    Description: Domain Service Role ARN from IAM stack
    Value: !GetAtt IAMRolesStack.Outputs.DomainServiceRoleArn
    Export:
      Name: !Sub "${AWS::StackName}-DomainServiceRoleArn"
      
  ProvisioningRoleArn:
    Description: Provisioning Role ARN from IAM stack
    Value: !GetAtt IAMRolesStack.Outputs.ProvisioningRoleArn
    Export:
      Name: !Sub "${AWS::StackName}-ProvisioningRoleArn"
      
  ManageAccessRoleArn:
    Description: Manage Access Role ARN from IAM stack
    Value: !GetAtt IAMRolesStack.Outputs.ManageAccessRoleArn
    Export:
      Name: !Sub "${AWS::StackName}-ManageAccessRoleArn"
    
  # Pass through Domain outputs
  DomainId:
    Description: ID of the created DataZone domain
    Value: !GetAtt DomainStack.Outputs.DomainId
    Export:
      Name: !Sub "${AWS::StackName}-DomainId"
      
  DomainArn:
    Description: ARN of the created DataZone domain
    Value: !GetAtt DomainStack.Outputs.DomainArn
    Export:
      Name: !Sub "${AWS::StackName}-DomainArn"
      
  DomainPortalUrl:
    Description: Portal URL of the created DataZone domain
    Value: !GetAtt DomainStack.Outputs.DomainPortalUrl
    Export:
      Name: !Sub "${AWS::StackName}-DomainPortalUrl"
