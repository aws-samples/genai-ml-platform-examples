AWSTemplateFormatVersion: '2010-09-09'
Description: 'MLOps SMUS - Secrets Manager Resources'

Parameters:
  ProjectPrefix:
    Type: String
    Default: 'mlops-smus'
    Description: 'Prefix for all resource names'


Resources:
  # GitHub Personal Access Token Secret
  GitHubTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectPrefix}-github-token'
      Description: 'GitHub Personal Access Token for repository access'
      GenerateSecretString:
        SecretStringTemplate: '{"token":""}'
        GenerateStringKey: 'token'
        IncludeSpace: false
        ExcludeCharacters: '/@"''\'
      Tags:
        - Key: 'Project'
          Value: !Ref ProjectPrefix
        - Key: 'Component'
          Value: 'secrets'

Outputs:
  GitHubTokenSecretArn:
    Description: 'ARN of the GitHub Token Secret'
    Value: !Ref GitHubTokenSecret
    Export:
      Name: !Sub '${ProjectPrefix}-github-token-arn'

  GitHubTokenSecretName:
    Description: 'Name of the GitHub Token Secret'
    Value: !Ref GitHubTokenSecret
    Export:
      Name: !Sub '${ProjectPrefix}-github-token-name'