        S3SubPrefix: 'UserB/*'
      Grantee:
        GranteeType: IAM
        GranteeIdentifier: !GetAtt UserBSageMakerExecutionRole.Arn

# Data Copy Lambda
  CopyS3FilesLambdaFunction: 
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: AccessGrantsBlogCopyS3FilesLambdaFunction
      Runtime: python3.9
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 59
      MemorySize: 255
      Environment:
        Variables:
          SOURCE_BUCKET: 'aws-blogs-artifacts-public'
          SOURCE_PREFIX: 'ML-16183/abalone.csv'
          DEST_BUCKET: !Ref GrantsBucket
          GITHUB_TEMPLATE_URL: 'https://raw.githubusercontent.com/aws-samples/genai-ml-platform-examples/main/platform/genai-ml-stdzn-on-smai/S3_model_build_deploy_template.yaml'
          GITHUB_CLASSIFICATION_TEMPLATE_URL: 'https://raw.githubusercontent.com/aws-samples/genai-ml-platform-examples/main/platform/genai-ml-stdzn-on-smai/S3_classification_template.yaml'
          GITHUB_BASE_URL: 'https://raw.githubusercontent.com/aws-samples/genai-ml-platform-examples/main/platform/genai-ml-stdzn-on-smai/seed-code'
          GITHUB_CLASSIFICATION_BASE_URL: 'https://raw.githubusercontent.com/aws-samples/genai-ml-platform-examples/main/platform/genai-ml-stdzn-on-smai/seed-code'
          SEED_CODE_TYPE: !Ref SeedCodeType
          DEST2_BUCKET: !Ref DataBucket
      Code:
        ZipFile: |
          import boto3
          import os
          import logging
          import cfnresponse
          import urllib.request
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          def lambda_handler(event, context):
              responseData = {}
              result = cfnresponse.FAILED
              try:
                  if event["RequestType"] == "Delete":
                      result = cfnresponse.SUCCESS

                  elif event["RequestType"] == "Create" or event["RequestType"] == "Update":

                      # Read environment variables
                      source_bucket = os.getenv('SOURCE_BUCKET', None)
                      dest_bucket = os.getenv('DEST_BUCKET', None)
                      source_prefix = os.getenv('SOURCE_PREFIX', None)

                      github_template_url = os.getenv('GITHUB_TEMPLATE_URL', None)
                      github_classification_template_url = os.getenv('GITHUB_CLASSIFICATION_TEMPLATE_URL', None)
                      github_base_url = os.getenv('GITHUB_BASE_URL', None)
                      seed_code_type = os.getenv('SEED_CODE_TYPE', 'llm-fine-tuning')
                      dest2_bucket = os.getenv('DEST2_BUCKET', None)

                      # Construct GitHub URLs dynamically based on seed code type
                      github_model_build_url = f"{github_base_url}/{seed_code_type}/model-build-repo.zip"
                      github_model_deploy_url = f"{github_base_url}/{seed_code_type}/model-deploy-repo.zip"

                      # Create S3 client
                      s3 = boto3.client('s3')

                      # Define the keys for the objects to be copied
                      user_a_key = 'UserA/abalone.csv'
                      user_b_key = 'UserB/abalone.csv'
                      product_key = 'Product/abalone.csv'

                      # Copy the objects from S3
                      logger.info(f"Copying object from {source_bucket}/{source_prefix} to {dest_bucket}/{user_a_key}")
                      s3.copy_object(Bucket=dest_bucket, Key=user_a_key, CopySource={'Bucket': source_bucket, 'Key': source_prefix})
                      logger.info(f"Copying object from {source_bucket}/{source_prefix} to {dest_bucket}/{user_b_key}")
                      s3.copy_object(Bucket=dest_bucket, Key=user_b_key, CopySource={'Bucket': source_bucket, 'Key': source_prefix})
                      logger.info(f"Copying object from {source_bucket}/{source_prefix} to {dest_bucket}/{product_key}")
                      s3.copy_object(Bucket=dest_bucket, Key=product_key, CopySource={'Bucket': source_bucket, 'Key': source_prefix})
                      
                      # Download template from GitHub and upload to S3
                      s3_template_key = 'S3_model_build_deploy_template.yaml'
                      logger.info(f"Downloading template from {github_template_url}")
                      with urllib.request.urlopen(github_template_url) as response:
                          template_content = response.read()
                      
                      logger.info(f"Uploading template to {dest2_bucket}/{s3_template_key}")
                      s3.put_object(Bucket=dest2_bucket, Key=s3_template_key, Body=template_content)
                      
                      # Download classification template from GitHub and upload to S3
                      s3_classification_template_key = 'S3_classification_template.yaml'
                      logger.info(f"Downloading classification template from {github_classification_template_url}")
                      with urllib.request.urlopen(github_classification_template_url) as response:
                          classification_template_content = response.read()
                      
                      logger.info(f"Uploading classification template to {dest2_bucket}/{s3_classification_template_key}")
                      s3.put_object(Bucket=dest2_bucket, Key=s3_classification_template_key, Body=classification_template_content)
                      
                      # Download LLM fine-tuning seed code
                      llm_base_url = f"{github_base_url}/llm-fine-tuning"
                      logger.info(f"Downloading LLM fine-tuning model-build-repo.zip from {llm_base_url}/model-build-repo.zip")
                      with urllib.request.urlopen(f"{llm_base_url}/model-build-repo.zip") as response:
                          llm_build_content = response.read()
                      logger.info(f"Uploading to {dest2_bucket}/model-build-repo.zip")
                      s3.put_object(Bucket=dest2_bucket, Key='model-build-repo.zip', Body=llm_build_content)
                      
                      logger.info(f"Downloading LLM fine-tuning model-deploy-repo.zip from {llm_base_url}/model-deploy-repo.zip")
                      with urllib.request.urlopen(f"{llm_base_url}/model-deploy-repo.zip") as response:
                          llm_deploy_content = response.read()
                      logger.info(f"Uploading to {dest2_bucket}/model-deploy-repo.zip")
                      s3.put_object(Bucket=dest2_bucket, Key='model-deploy-repo.zip', Body=llm_deploy_content)
                      
                      # Download classification seed code from fork
                      github_classification_base_url = os.getenv('GITHUB_CLASSIFICATION_BASE_URL', None)
                      classification_base_url = f"{github_classification_base_url}/classification" if github_classification_base_url else f"{github_base_url}/classification"
                      logger.info(f"Downloading classification model-build-repo.zip from {classification_base_url}/model-build-repo.zip")
                      with urllib.request.urlopen(f"{classification_base_url}/model-build-repo.zip") as response:
                          classification_build_content = response.read()
                      logger.info(f"Uploading to {dest2_bucket}/classification-model-build-repo.zip")
                      s3.put_object(Bucket=dest2_bucket, Key='classification-model-build-repo.zip', Body=classification_build_content)
                      
                      logger.info(f"Downloading classification model-deploy-repo.zip from {classification_base_url}/model-deploy-repo.zip")
                      with urllib.request.urlopen(f"{classification_base_url}/model-deploy-repo.zip") as response:
                          classification_deploy_content = response.read()
                      logger.info(f"Uploading to {dest2_bucket}/classification-model-deploy-repo.zip")
                      s3.put_object(Bucket=dest2_bucket, Key='classification-model-deploy-repo.zip', Body=classification_deploy_content)

                      # add object tagging to s3 template key
                      put_tags_response = s3.put_object_tagging(
                          Bucket=dest2_bucket,
                          Key=s3_template_key,    
                          Tagging={
                              'TagSet': [
                                  {
                                      'Key': 'sagemaker:studio-visibility',
                                      'Value': 'true'
                                  },
                              ]
                          }
                      )
                      
                      # add object tagging to classification template key
                      put_tags_response = s3.put_object_tagging(
                          Bucket=dest2_bucket,
                          Key=s3_classification_template_key,    
                          Tagging={
                              'TagSet': [
                                  {
                                      'Key': 'sagemaker:studio-visibility',
                                      'Value': 'true'
                                  },
                              ]
                          }
                      )

                      result = cfnresponse.SUCCESS


                  else:
                      result = cfnresponse.SUCCESS
              except Exception as e:
                  result = cfnresponse.FAILED
                  responseData=str(e)
                  logger.error(f"An error occurred: {e}")
            
                  raise e
              cfnresponse.send(event, context, result, responseData)
              return { "response": responseData}
          
