  # Lambda Function to Create Serverless MLflow App
  CreateMLflowAppLambda:
    Type: AWS::Lambda::Function
    DependsOn:
      - MLflowTrackingServerRole
      - DataBucket
    Properties:
      FunctionName: !Sub '${ProjectName}-create-mlflow-app'
      Description: Create Serverless MLflow App for experiment tracking
      Handler: index.lambda_handler
      Role: !GetAtt MLflowAppLambdaRole.Arn
      Runtime: python3.12
      Timeout: 600
      Code:
        ZipFile: !Sub |
          import subprocess
          import sys
          
          # Install updated boto3 with MLflow Apps API support
          subprocess.check_call([sys.executable, "-m", "pip", "install", "--target", "/tmp", "boto3==1.42.54"])
          sys.path.insert(0, '/tmp')
          
          import boto3
          import cfnresponse
          import time
                    
          client = boto3.client('sagemaker')
          
          def lambda_handler(event, context):
              print(f"Event: {event}")
              
              try:
                  request_type = event.get('RequestType', 'Create')
                  stack_name = event['ResourceProperties']['StackName']
                  mlflow_app_name = event['ResourceProperties']['MLflowAppName']
                  artifact_store_uri = event['ResourceProperties']['ArtifactStoreUri']
                  role_arn = event['ResourceProperties']['RoleArn']
                  
                  if request_type == 'Create':
                      # Check if MLflow App already exists
                      try:
                          response = client.list_mlflow_apps(MaxResults=100)
                          existing_apps = response.get('Summaries', [])
                          for app in existing_apps:
                              if app['Name'] == mlflow_app_name:
                                  print(f"MLflow App {mlflow_app_name} already exists")
                                  response_data = {
                                      'MLflowAppArn': app['Arn'],
                                      'MLflowAppName': app['Name']
                                  }
                                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data, app['Arn'])
                                  return
                      except Exception as e:
                          print(f"Error checking existing apps: {e}")
                      
                      # Create MLflow App
                      print(f"Creating MLflow App: {mlflow_app_name}")
                      response = client.create_mlflow_app(
                          Name=mlflow_app_name,
                          ArtifactStoreUri=artifact_store_uri,
                          RoleArn=role_arn,
                          Tags=[
                              {'Key': 'StackName', 'Value': stack_name},
                              {'Key': 'ManagedBy', 'Value': 'CloudFormation'},
                              {'Key': 'ProjectName', 'Value': '${ProjectName}'}
                          ]
                      )
                      
                      mlflow_app_arn = response['Arn']
                      print(f"Created MLflow App: {mlflow_app_arn}")
                      
                      # Return immediately - MLflow App will finish creating asynchronously
                      response_data = {
                          'MLflowAppArn': mlflow_app_arn,
                          'MLflowAppName': mlflow_app_name
                      }
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data, mlflow_app_arn)
                      return
                      
                  elif request_type == 'Delete':
                      # Delete MLflow App
                      try:
                          print(f"Deleting MLflow App: {mlflow_app_name}")
                          client.delete_mlflow_app(Arn=mlflow_app_name)
                          print(f"Deleted MLflow App: {mlflow_app_name}")
                      except client.exceptions.ResourceNotFound:
                          print(f"MLflow App {mlflow_app_name} not found, skipping deletion")
                      except Exception as e:
                          print(f"Error deleting MLflow App: {e}")
                      
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  
                  else:  # Update
                      # MLflow Apps don't support updates, return existing
                      response_data = {
                          'MLflowAppArn': event['PhysicalResourceId'],
                          'MLflowAppName': mlflow_app_name
                      }
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data, event['PhysicalResourceId'])
                      return
              
              except Exception as e:
                  print(f"Error: {e}")
                  import traceback
                  traceback.print_exc()
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

