    Properties:
      IamRoleArn:  !GetAtt S3AccessGrantsRole.Arn
      LocationScope: !Sub s3://${GrantsBucket}
    DependsOn: AccessGrantsInstance
    
  S3AccessGrantProductReadUserA:
