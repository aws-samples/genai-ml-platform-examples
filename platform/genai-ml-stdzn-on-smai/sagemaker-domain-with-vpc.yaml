# access grants IAM policy
  S3AccessGrantsIAMPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: KMSPermissions
            Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: "*"
          - Sid: ObjectLevelReadPermissions
            Effect: Allow
            Action:
            - s3:GetObject
            - s3:GetObjectVersion
            - s3:GetObjectAcl
            - s3:GetObjectVersionAcl
            - s3:ListMultipartUploadParts
            Resource:
            - arn:aws:s3:::*
            Condition:
              StringEquals:
                aws:ResourceAccount: !Sub '${AWS::AccountId}'
              ArnEquals:
                s3:AccessGrantsInstanceArn:
                - !Sub 'arn:aws:s3:${AWS::Region}:${AWS::AccountId}:access-grants/default'
          - Sid: ObjectLevelWritePermissions
            Effect: Allow
            Action:
            - s3:PutObject
            - s3:PutObjectAcl
            - s3:PutObjectVersionAcl
            - s3:DeleteObject
            - s3:DeleteObjectVersion
            - s3:AbortMultipartUpload
            Resource:
            - arn:aws:s3:::*
            Condition:
              StringEquals:
                aws:ResourceAccount: !Sub '${AWS::AccountId}'
              ArnEquals:
                s3:AccessGrantsInstanceArn:
                - !Sub 'arn:aws:s3:${AWS::Region}:${AWS::AccountId}:access-grants/default'
          - Sid: BucketLevelReadPermissions
            Effect: Allow
            Action:
            - s3:ListBucket
            Resource:
            - arn:aws:s3:::*
            Condition:
              StringEquals:
                aws:ResourceAccount: !Sub '${AWS::AccountId}'
              ArnEquals:
                s3:AccessGrantsInstanceArn:
                - !Sub 'arn:aws:s3:${AWS::Region}:${AWS::AccountId}:access-grants/default'
      Roles:
        - !Ref S3AccessGrantsRole
 
#sagemaker projects policy
  SageMakerServiceCatalogManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${ProjectName}-smprojects-policy
      Description: Policy for SageMaker Service Catalog, EventBridge, CodeStar, and CI/CD services
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # CodeStar Connections and EventBridge Rules
          - Sid: CodeStarConnectionsAndEvents
            Effect: Allow
            Action:
              - events:DescribeRule
              - iam:UntagRole
              - iam:ListRoleTags
              - codestar-connections:GetInstallationUrl
              - iam:TagRole
              - events:PutRule
              - codestar-connections:GetConnection
              - codestar-connections:*
              - codestar-connections:ListRepositoryLinks
              - codestar-connections:ListConnections
              - codestar-connections:GetIndividualAccessToken
              - events:PutTargets
              - events:DeleteRule
              - codestar-connections:UseConnection
              - codestar-connections:GetConnectionToken
              - codestar-connections:StartOAuthHandshake
              - events:RemoveTargets
              - codestar-connections:PassConnection
            Resource: "*"

          # IAM PassRole for SageMaker Service Catalog Roles
          - Sid: PassRoleForServiceCatalog
            Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/service-role/AmazonSageMakerServiceCatalogProductsLaunchRole"
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/service-role/AmazonSageMakerServiceCatalogProductsUseRole"
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/service-role/AmazonSageMakerServiceCatalogProductsApiGatewayRole"
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/service-role/AmazonSageMakerServiceCatalogProductsCloudformationRole"
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/service-role/AmazonSageMakerServiceCatalogProductsCodeBuildRole"
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/service-role/AmazonSageMakerServiceCatalogProductsCodePipelineRole"
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/service-role/AmazonSageMakerServiceCatalogProductsEventsRole"
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/service-role/AmazonSageMakerServiceCatalogProductsFirehoseRole"
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/service-role/AmazonSageMakerServiceCatalogProductsGlueRole"
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/service-role/AmazonSageMakerServiceCatalogProductsExecutionRole"
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/service-role/AmazonSageMakerServiceCatalogProductsLambdaRole"

          # SageMaker Domain Tags
          - Sid: SageMakerDomainTags
            Effect: Allow
            Action:
              - sagemaker:ListTags
            Resource:
              - !Sub "arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:domain/*"

          # Lambda Functions
          - Sid: LambdaFunctions
            Effect: Allow
            Action:
              - lambda:GetFunction
              - lambda:*
            Resource: "*"

          # CloudFormation
          - Sid: CloudFormation
            Effect: Allow
            Action:
              - cloudformation:*
            Resource: "*"

          # CI/CD Services
          - Sid: CICDServices
            Effect: Allow
            Action:
              - codeconnections:*
              - codedeploy:*
              - codepipeline:*
              - codebuild:*
            Resource: "*"

          # Tagging Permissions
          - Sid: TaggingPermissions
            Effect: Allow
            Action:
              - tag:GetResources
              - tag:TagResources
              - tag:UntagResources
              - tag:GetTagKeys
              - tag:GetTagValues
              - codebuild:CreateReportGroup
              - codebuild:CreateReport
              - codebuild:UpdateReport
              - codebuild:BatchPutTestCases
              - codepipeline:TagResource
              - codepipeline:UntagResource
              - events:TagResource
              - events:UntagResource
              - lambda:TagResource
              - lambda:UntagResource
              - s3:PutBucketTagging
              - s3:GetBucketTagging
            Resource: "*"
      Roles:
        - !Ref ProductSageMakerExecutionRole
        - !Ref UserASageMakerExecutionRole
        - !Ref UserBSageMakerExecutionRole

  ProductSageMakerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      RoleName: !Sub ${ProjectName}-product-role
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess

  UserASageMakerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      RoleName: !Sub ${ProjectName}-usera-role
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess

  UserBSageMakerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      RoleName: !Sub ${ProjectName}-userb-role
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"
      RoleName: !Sub ${ProjectName}-ag-lambda-execution
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonS3FullAccess

