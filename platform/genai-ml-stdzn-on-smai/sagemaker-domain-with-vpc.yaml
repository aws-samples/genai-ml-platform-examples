
AWSTemplateFormatVersion: 2010-09-09
Description: >
  This template creates a VPC with public and private subnets, Internet Gateway, NAT Gateway,
  VPC endpoints, SageMaker Domain with user profiles, Serverless MLflow Tracking Server, and S3 access grants configuration.
  Private subnets host SageMaker resources and have outbound internet access via NAT Gateway.
  Includes MLflow for experiment tracking and model management.
Parameters:

  ProjectName:
    Type: String
    Default: 'smai-project-a'
    Description: 'Project name (must be lowercase letters, numbers, and hyphens only)'
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: 'ProjectName must contain only lowercase letters, numbers, and hyphens'

  VpcCIDR:
    Type: String
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'
    Default:  10.0.0.0/16

  PrivateSubnetCIDR:
    Type: String
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'
    Default: 10.0.1.0/24

  PrivateSubnet2CIDR:
    Type: String
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'
    Default: 10.0.2.0/24

  PublicSubnetCIDR:
    Type: String
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'
    Default: 10.0.3.0/24

  JupyterLabAppInstance:
    Type: String
    Description: Name of an ML instance to run JupyterLab App space
    Default: 'ml.m5.2xlarge'

  UserAProfileName:
    Type: String
    Description: Name for User A profile
    Default: 'userA'

  UserBProfileName:
    Type: String
    Description: Name for User B profile
    Default: 'userB'

  SeedCodeType:
    Type: String
    Description: Type of seed code to use for SageMaker projects
    Default: 'llm-fine-tuning'
    AllowedValues:
      - regression
      - llm-fine-tuning
      - classification

Resources:

# Network
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-vpc

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: !Ref PrivateSubnetCIDR
      VpcId: !Ref VPC
      AvailabilityZone: !Sub  "${AWS::Region}a"
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-subnet

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: !Ref PrivateSubnet2CIDR
      VpcId: !Ref VPC
      AvailabilityZone: !Sub  "${AWS::Region}b"
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-subnet-2

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: !Ref PublicSubnetCIDR
      VpcId: !Ref VPC
      AvailabilityZone: !Sub  "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-subnet

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  NATGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-nat-eip

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-nat-gateway

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: security group for SageMaker notebook instance, training jobs and hosting endpoint
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic to Internet
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-security-group

  SecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      IpProtocol: '-1'
      GroupId: !Ref SecurityGroup
      SourceSecurityGroupId: !Ref SecurityGroup
      Description: Allow traffic within security group

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-rt


  PrivateRoute:
    Type: AWS::EC2::Route
    DependsOn: NATGateway
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway

  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet2

  VPCEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow TLS for VPC Endpoint
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic from VPC Endpoints
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-endpoint-security-group

  EndpointSecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      GroupId: !Ref VPCEndpointSecurityGroup
      SourceSecurityGroupId: !Ref SecurityGroup

  EndpointSecurityGroupIngressFromVPC:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      GroupId: !Ref VPCEndpointSecurityGroup
      CidrIp: !Ref VpcCIDR
      Description: Allow HTTPS from VPC CIDR

  VPCEndpointS3:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      VpcId: !Ref VPC
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action:
              - "s3:GetObject"
              - "s3:PutObject"
              - "s3:ListBucket"
              - "s3:DeleteObject"
              - "s3:GetObjectVersion"
              - "s3:GetBucketLocation"
              - "s3:ListAllMyBuckets"
              - "s3:CreateBucket"
            Resource: "arn:aws:s3:::*"
          - Effect: Allow
            Principal: "*"
            Action: "s3:GetDataAccess"
            Resource: !Sub "arn:aws:s3:${AWS::Region}:${AWS::AccountId}:access-grants/default"
      RouteTableIds:
        - !Ref PrivateRouteTable
        - !Ref PublicRouteTable

  VPCEndpointS3Id:
    Type: 'AWS::SSM::Parameter'
    Properties:
      Name: !Sub "ds-s3-endpoint-${ProjectName}-id"
      Type: String
      Value: !Ref VPCEndpointS3
      Description: S3 VPC Endpoint ID

  VPCEndpointSagemakerAPI:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: '*'
            Resource: '*'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.sagemaker.api'
      VpcId: !Ref VPC

  VPCEndpointSageMakerRuntime:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: '*'
            Resource: '*'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.sagemaker.runtime'
      VpcId: !Ref VPC

  VPCEndpointSageMakerStudio:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: '*'
            Resource: '*'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      ServiceName: !Sub 'aws.sagemaker.${AWS::Region}.studio'
      VpcId: !Ref VPC

  VPCEndpointSTS:
    Type: 'AWS::EC2::VPCEndpoint'
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: '*'
            Resource: '*'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.sts'
      VpcId: !Ref VPC

  VPCEndpointSSM:
    Type: 'AWS::EC2::VPCEndpoint'
    Properties:
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ssm'
      VpcId: !Ref VPC

  VPCEndpointCW:
    Type: 'AWS::EC2::VPCEndpoint'
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: '*'
            Resource: '*'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.monitoring'
      VpcId: !Ref VPC

  VPCEndpointCWL:
    Type: 'AWS::EC2::VPCEndpoint'
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: '*'
            Resource: '*'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.logs'
      VpcId: !Ref VPC

  VPCEndpointECR:
    Type: 'AWS::EC2::VPCEndpoint'
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: '*'
            Resource: '*'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.dkr'
      VpcId: !Ref VPC

  VPCEndpointECRAPI:
    Type: 'AWS::EC2::VPCEndpoint'
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: '*'
            Resource: '*'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.api'
      VpcId: !Ref VPC

# IAM Policies
  S3GetDataPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${ProjectName}-s3-data-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - "s3:GetDataAccess"
            Resource:
              - !Sub "arn:aws:s3:${AWS::Region}:${AWS::AccountId}:access-grants/default"
      Roles:
        - !Ref ProductSageMakerExecutionRole
        - !Ref UserASageMakerExecutionRole
        - !Ref UserBSageMakerExecutionRole

  S3AccessGrantsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${ProjectName}-ag-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ObjectLevelReadPermissions
            Effect: Allow
            Action:
              - "s3:GetObject"
              - "s3:GetObjectVersion"
              - "s3:GetObjectAcl"
              - "s3:GetObjectVersionAcl"
              - "s3:ListMultipartUploadParts"
            Resource:
              - "arn:aws:s3:::*"
            Condition:
              StringEquals:
                "aws:ResourceAccount": !Ref "AWS::AccountId"
              ArnEquals:
                "s3:AccessGrantsInstanceArn":
                  - !Sub "arn:aws:s3:${AWS::Region}:${AWS::AccountId}:access-grants/default"
          - Sid: ObjectLevelWritePermissions
            Effect: Allow
            Action:
              - "s3:PutObject"
              - "s3:PutObjectAcl"
              - "s3:PutObjectVersionAcl"
              - "s3:DeleteObject"
              - "s3:DeleteObjectVersion"
              - "s3:AbortMultipartUpload"
            Resource:
              - "arn:aws:s3:::*"
            Condition:
              StringEquals:
                "aws:ResourceAccount": !Ref "AWS::AccountId"
              ArnEquals:
                "s3:AccessGrantsInstanceArn":
                  - !Sub "arn:aws:s3:${AWS::Region}:${AWS::AccountId}:access-grants/default"
          - Sid: BucketLevelReadPermissions
            Effect: Allow
            Action:
              - "s3:ListBucket"
            Resource:
              - "arn:aws:s3:::*"
            Condition:
              StringEquals:
                "aws:ResourceAccount": !Ref "AWS::AccountId"
              ArnEquals:
                "s3:AccessGrantsInstanceArn":
                  - !Sub "arn:aws:s3:${AWS::Region}:${AWS::AccountId}:access-grants/default"
      Roles:
        - !Ref ProductSageMakerExecutionRole

  SageMakerStudioUserPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${ProjectName}-studio-user-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: SMStudioCreatePresignedDomainUrlForUserProfile
            Effect: Allow
            Action:
              - "sagemaker:CreatePresignedDomainUrl"
            Resource: "*"
          - Sid: SMStudioAppPermissionsListAndDescribe
            Effect: Allow
            Action:
              - "sagemaker:ListApps"
              - "sagemaker:ListDomains"
              - "sagemaker:ListUserProfiles"
              - "sagemaker:ListSpaces"
              - "sagemaker:DescribeApp"
              - "sagemaker:DescribeDomain"
              - "sagemaker:DescribeUserProfile"
              - "sagemaker:DescribeSpace"
            Resource: "*"
          - Sid: KMSAccess
            Effect: Allow
            Action:
              - "kms:CreateGrant"
              - "kms:Decrypt"
              - "kms:DescribeKey"
              - "kms:Encrypt"
              - "kms:GenerateDataKey"
              - "kms:ListAliases"
            Resource: "*"
          - Sid: S3LocalDataAccess
            Effect: Allow
            Action:
              - "s3:GetObject"
              - "s3:PutObject"
              - "s3:DeleteObject"
              - "s3:ListBucket"
              - "s3:GetObjectTagging"
              - "s3:PutObjectTagging"
              - "s3:PutBucketTagging"
            Resource:
              - !Sub "arn:aws:s3:::${ProjectName}-data-${AWS::AccountId}-${AWS::Region}"
              - !Sub "arn:aws:s3:::${ProjectName}-data-${AWS::AccountId}-${AWS::Region}/*"
              - !Sub "arn:aws:s3:::${ProjectName}-grants-${AWS::AccountId}-${AWS::Region}"
              - !Sub "arn:aws:s3:::${ProjectName}-grants-${AWS::AccountId}-${AWS::Region}/*"
              - "arn:aws:s3:::aws-ml-blog/artifacts/sm-ai-gov-workshop/*"
              - "arn:aws:s3:::sagemaker-project-*"
          
          - Sid: EventsRuleAll
            Effect: Allow
            Action:
              - "events:*"
            Resource:
              - !Sub "arn:aws:events:us-east-1:${AWS::AccountId}:rule/*"
      Roles:
        - !Ref UserASageMakerExecutionRole
        - !Ref UserBSageMakerExecutionRole

# Sagemaker CommonJobManagement Policy 
  SageMakerCommonJobManagementPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
            - sagemaker:CreateTrainingJob
            - sagemaker:CreateTransformJob
            - sagemaker:CreateProcessingJob
            - sagemaker:CreateAutoMLJob
            - sagemaker:CreateHyperParameterTuningJob
            - sagemaker:StopTrainingJob
            - sagemaker:StopProcessingJob
            - sagemaker:StopAutoMLJob
            - sagemaker:StopHyperParameterTuningJob
            - sagemaker:DescribeTrainingJob
            - sagemaker:DescribeTransformJob
            - sagemaker:DescribeProcessingJob
            - sagemaker:DescribeAutoMLJob
            - sagemaker:DescribeHyperParameterTuningJob
            - sagemaker:UpdateTrainingJob
            - sagemaker:BatchGetMetrics
            Resource: arn:aws:sagemaker:*:*:*/*
          - Effect: Allow
            Action:
            - sagemaker:Search
            - sagemaker:ListTrainingJobs
            - sagemaker:ListTransformJobs
            - sagemaker:ListProcessingJobs
            - sagemaker:ListAutoMLJobs
            - sagemaker:ListCandidatesForAutoMLJob
            - sagemaker:ListHyperParameterTuningJobs
            - sagemaker:ListTrainingJobsForHyperParameterTuningJob
            Resource: "*"
          - Effect: Allow
            Action: iam:PassRole
            Resource:
            - !GetAtt UserASageMakerExecutionRole.Arn
            - !GetAtt UserBSageMakerExecutionRole.Arn
            Condition:
              StringEquals:
                iam:PassedToService: sagemaker.amazonaws.com
      Roles:
        - !Ref UserASageMakerExecutionRole
        - !Ref UserBSageMakerExecutionRole
        - !Ref ProductSageMakerExecutionRole

# Sagemaker ExperimentsManagement
  SageMakerExperimentsManagementPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
            - sagemaker:AddAssociation
            - sagemaker:CreateAction
            - sagemaker:CreateArtifact
            - sagemaker:CreateContext
            - sagemaker:CreateExperiment
            - sagemaker:CreateTrial
            - sagemaker:CreateTrialComponent
            - sagemaker:UpdateAction
            - sagemaker:UpdateArtifact
            - sagemaker:UpdateContext
            - sagemaker:UpdateExperiment
            - sagemaker:UpdateTrial
            - sagemaker:UpdateTrialComponent
            - sagemaker:AssociateTrialComponent
            - sagemaker:DisassociateTrialComponent
            - sagemaker:DeleteAssociation
            - sagemaker:DeleteAction
            - sagemaker:DeleteArtifact
            - sagemaker:DeleteContext
            - sagemaker:DeleteExperiment
            - sagemaker:DeleteTrial
            - sagemaker:DeleteTrialComponent
            Resource: arn:aws:sagemaker:*:*:*/*
      Roles:
        - !Ref UserASageMakerExecutionRole
        - !Ref UserBSageMakerExecutionRole
        - !Ref ProductSageMakerExecutionRole
# Sagemaker ExperimentsVisualization
  SageMakerExperimentsVisualizationPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - sagemaker:CreateVisualization
              - sagemaker:DeleteVisualization
              - sagemaker:DescribeVisualization
              - sagemaker:UpdateVisualization
              - sagemaker:ListModel
            Resource: "*"

          - Effect: Allow
            Action:
            - sagemaker:DescribeAction
            - sagemaker:DescribeArtifact
            - sagemaker:DescribeContext
            - sagemaker:DescribeExperiment
            - sagemaker:DescribeTrial
            - sagemaker:DescribeTrialComponent
            - sagemaker:DescribeLineageGroup
            Resource: arn:aws:sagemaker:*:*:*/*
          - Effect: Allow
            Action:
            - sagemaker:ListAssociations
            - sagemaker:ListActions
            - sagemaker:ListArtifacts
            - sagemaker:ListContexts
            - sagemaker:ListExperiments
            - sagemaker:ListTrials
            - sagemaker:ListTrialComponents
            - sagemaker:ListLineageGroups
            - sagemaker:GetLineageGroupPolicy
            - sagemaker:QueryLineage
            - sagemaker:Search
            - sagemaker:GetSearchSuggestions
            Resource: "*"


      Roles:
        - !Ref UserASageMakerExecutionRole
        - !Ref UserBSageMakerExecutionRole
        - !Ref ProductSageMakerExecutionRole

# Sagemaker ModelManagement
  SageMakerModelManagementPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
            - sagemaker:CreateModel
            - sagemaker:CreateModelPackage
            - sagemaker:CreateModelPackageGroup
            - sagemaker:DescribeModel
            - sagemaker:DescribeModelPackage
            - sagemaker:DescribeModelPackageGroup
            - sagemaker:BatchDescribeModelPackage
            - sagemaker:UpdateModelPackage
            - sagemaker:DeleteModel
            - sagemaker:DeleteModelPackage
            - sagemaker:DeleteModelPackageGroup
            Resource: arn:aws:sagemaker:*:*:*/*

          - Effect: Allow
            Action:
            - sagemaker:ListModels
            - sagemaker:ListModelPackages
            - sagemaker:ListModelPackageGroups
            Resource: "*"

          - Effect: Allow
            Action: iam:PassRole
            Resource:
            - !GetAtt UserASageMakerExecutionRole.Arn
            - !GetAtt UserBSageMakerExecutionRole.Arn
            Condition:
              StringEquals:
                iam:PassedToService: sagemaker.amazonaws.com
      Roles:
        - !Ref UserASageMakerExecutionRole
        - !Ref UserBSageMakerExecutionRole
        - !Ref ProductSageMakerExecutionRole

# Sagemaker StudioAppPermissions
  SageMakerStudioAppPermissionsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - sagemaker:CreateApp
              - sagemaker:DeleteApp
              - sagemaker:DescribeApp
              - sagemaker:ListModel
              - sagemaker:UpdateApp
            Resource: "*"

          - Sid: SMStudioUserProfileAppPermissionsCreateAndDelete
            Effect: Allow
            Action:
            - sagemaker:CreateApp
            - sagemaker:DeleteApp
            Resource: !Sub arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:app/*
            Condition:
              'Null':
                sagemaker:OwnerUserProfileArn: 'true'

          - Sid: SMStudioCreatePresignedDomainUrlForUserProfile
            Effect: Allow
            Action:
            - sagemaker:CreatePresignedDomainUrl
            Resource: !Sub arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:user-profile/*/*

          - Sid: SMStudioAppPermissionsListAndDescribe
            Effect: Allow
            Action:
            - sagemaker:ListApps
            - sagemaker:ListDomains
            - sagemaker:ListUserProfiles
            - sagemaker:ListSpaces
            - sagemaker:DescribeApp
            - sagemaker:DescribeDomain
            - sagemaker:DescribeUserProfile
            - sagemaker:DescribeSpace
            Resource: "*"

          - Sid: SMStudioAppPermissionsTagOnCreate
            Effect: Allow
            Action:
            - sagemaker:AddTags
            Resource: !Sub arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:*/*
            Condition:
              'Null':
                sagemaker:TaggingAction: 'false'

          - Sid: SMStudioRestrictSharedSpacesWithoutOwners
            Effect: Allow
            Action:
            - sagemaker:CreateSpace
            - sagemaker:UpdateSpace
            - sagemaker:DeleteSpace
            Resource: !Sub arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:space/*/*
            Condition:
              'Null':
                sagemaker:OwnerUserProfileArn: 'true'
          - Sid: SMStudioRestrictSpacesToOwnerUserProfile
            Effect: Allow
            Action:
            - sagemaker:CreateSpace
            - sagemaker:UpdateSpace
            - sagemaker:DeleteSpace
            Resource: !Sub arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:space/*/*
            Condition:
              ArnLike:
                sagemaker:OwnerUserProfileArn: !Sub arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:user-profile/*/*
              StringEquals:
                sagemaker:SpaceSharingType:
                - Private
                - Shared
          - Sid: SMStudioRestrictCreatePrivateSpaceAppsToOwnerUserProfile
            Effect: Allow
            Action:
            - sagemaker:CreateApp
            - sagemaker:DeleteApp
            Resource: !Sub arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:app/*/*
            Condition:
              ArnLike:
                sagemaker:OwnerUserProfileArn: !Sub arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:user-profile/*/*
              StringEquals:
                sagemaker:SpaceSharingType:
                - Private
          - Sid: AllowAppActionsForSharedSpaces
            Effect: Allow
            Action:
            - sagemaker:CreateApp
            - sagemaker:DeleteApp
            Resource: !Sub arn:aws:sagemaker:*:*:app/*/*/*/*
            Condition:
              StringEquals:
                sagemaker:SpaceSharingType:
                - Shared
      Roles:
        - !Ref UserASageMakerExecutionRole
        - !Ref UserBSageMakerExecutionRole
        - !Ref ProductSageMakerExecutionRole

# Sagemaker MLflow Permissions
  SageMakerMLflowPolicy:
